assets:
  - BTC
  - ETH
  - SOL

mode: SESSION          # DAILY | SESSION | BOTH

# --- Session Windows (all times UTC) ---
sessions:
  tokyo:
    enabled: true
    range_start: "00:00"
    range_end:   "03:00"
  london:
    enabled: true
    range_start: "07:00"
    range_end:   "09:00"
  new_york:
    enabled: true
    range_start: "13:00"
    range_end:   "15:00"

# --- Order Settings ---
orders:
  take_profit_pct: 1.5
  stop_loss_pct:   0.75
  delete_orders_utc: "23:00"

# --- Risk Settings ---
risk:
  risk_per_trade_pct: 1.0
  max_daily_drawdown_pct: 3.0
  use_auto_lot: true
  fixed_lot_size: 0.01

# --- Trade Management ---
management:
  trailing_stop_enabled: true
  trailing_start_pct: 0.3
  trailing_distance_pct: 0.3
  trailing_step_pct: 0.05
  breakeven_enabled: false
  breakeven_trigger_pct: 0.3

# --- Filters ---
filters:
  trade_monday:    true
  trade_tuesday:   true
  trade_wednesday: true
  trade_thursday:  true
  trade_friday:    true
  news_filter_enabled: true
  news_mins_before: 15
  news_mins_after:  15
  news_close_positions: true
  news_high_impact_only: true

# --- Costs (realistic execution) ---
costs:
  exchange_fee_bps: 3.0       # HL taker fee: 3bp per side (entry + exit = 6bp round trip)
  slippage_bps: 1.5           # estimated slippage per fill (stop orders in volatile markets)
  funding_rate_bps: 1.0       # avg hourly funding cost in bps (annualizes to ~87% but most positions are short-lived)
  builder_fee_bps: 0.5        # builder code fee (from fee_tenths_bps / 10)

# --- Backtest Settings ---
backtest:
  start_date: "2023-01-01"
  end_date:   "2025-01-01"
  initial_capital: 10000
  candle_interval: "15m"    # 1m only available ~4 days back; 15m ~30d; 1h ~180d; 4h ~2yr

# --- Builder Code (live mode only) ---
builder:
  address: ""
  fee_tenths_bps: 5
